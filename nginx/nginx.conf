events {
    worker_connections 1024;
}

http {
    # Use Docker embedded DNS for dynamic service name resolution.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api {
        server api:4000;
    }

    upstream web {
        server web:3000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com;" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Redirect HTTP → HTTPS (uncomment for production)
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl http2;  # Uncomment for production
        server_name _;

        # SSL (uncomment for production)
        # ssl_certificate /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        # Explicit WhatsApp webhook route with shorter upstream timeout
        location = /api/v1/webhooks/whatsapp {
            set $api_upstream http://api:4000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # Backend API proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            set $api_upstream http://api:4000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check proxy
        location /health {
            set $api_health http://api:4000/health;
            proxy_pass $api_health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Static files (uploads)
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # n8n permanece interno e nunca e exposto ao publico
        location ^~ /n8n/ {
            return 404;
        }

        # Frontend Next.js
        location / {
            set $web_upstream http://web:3000;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 30s;
        }

        # NOTE: somente web, API, health e uploads sao expostos; n8n e demais servicos internos permanecem privados.
    }
}
