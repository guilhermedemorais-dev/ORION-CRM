events {
    worker_connections 1024;
}

http {
    # Use Docker embedded DNS for dynamic service name resolution.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api_backend {
        server api:4000;
    }

    upstream web_backend {
        server web:3000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' ws: wss: http: https:;" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name crm.orinjoias.com api.crm.orinjoias.com local.orinjoias.com;

        client_max_body_size 10M;

        # Explicit WhatsApp webhook route with shorter upstream timeout
        location = /api/v1/webhooks/whatsapp {
            set $api_upstream http://api_backend;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        # Next.js internal proxy routes must be handled by the web app, not the API container.
        location ^~ /api/internal/ {
            set $web_upstream http://web_backend;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 30s;
        }

        # Backend API proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            set $api_upstream http://api_backend;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check proxy
        location /health {
            set $api_health http://api_backend/health;
            proxy_pass $api_health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Static files (uploads)
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # n8n permanece interno e nunca e exposto ao publico
        location ^~ /n8n/ {
            return 404;
        }

        # Frontend Next.js
        location / {
            set $web_upstream http://web_backend;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 30s;
        }

        # NOTE: somente web, API, health e uploads sao expostos; n8n e demais servicos internos permanecem privados.
    }
}
