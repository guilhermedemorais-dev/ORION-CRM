name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: guilhermedemorais-dev
  REPO: orion-crm

jobs:
  build-and-push:
    name: Build images & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ──────────────────────────────────────────────
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── WEB ──────────────────────────────────────────────
      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── NGINX ─────────────────────────────────────────────
      - name: Build & push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy no servidor
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /docker/orion-crm

            # Login no GHCR com Personal Access Token
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u guilhermedemorais-dev --password-stdin

            # Puxa as novas imagens
            docker compose pull api web nginx

            # Recria só os containers que mudaram (banco e redis ficam intactos)
            docker compose up -d --no-build api web nginx

            # Remove imagens antigas para liberar espaço
            docker image prune -f
