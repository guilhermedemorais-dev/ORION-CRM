# Backend deployável do Bloco 1 (sem frontend e serviços de fases futuras).
services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion_dev_password}
      POSTGRES_DB: orion_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- ORION API (Node.js + Express) ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "node dist/db/migrate.js && node dist/index.js"
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: postgres://orion:${POSTGRES_PASSWORD:-orion_dev_password}@postgres:5432/orion_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me_12345678901234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_123456789012345}
      OPERATOR_WEBHOOK_SECRET: ${OPERATOR_WEBHOOK_SECRET:-dev_operator_secret_change_me_123456789012}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/orion-lead-captured}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - uploads_data:/app/uploads

  # ---- ORION Web (Next.js shell + CRM) ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      ORION_API_URL: http://api:4000/api/v1
    depends_on:
      api:
        condition: service_started
    networks:
      - app_network

  # ---- n8n (Automacoes internas / nao exposto publicamente) ----
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.88.0
    restart: unless-stopped
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_EDITOR_BASE_URL: ${APP_URL:-http://localhost}
      WEBHOOK_URL: ${APP_URL:-http://localhost}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      api:
        condition: service_started
    networks:
      - app_network

  # ---- NGINX (Reverse Proxy) ----
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - uploads_data:/app/uploads:ro
    depends_on:
      - api
      - web
      - n8n
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  n8n_data:

networks:
  app_network:
    driver: bridge
