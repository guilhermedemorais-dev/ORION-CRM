# Backend deployável do Bloco 1 (sem frontend e serviços de fases futuras).
services:

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion_dev_password}
      POSTGRES_DB: orion_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network_v2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - app_network_v2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- ORION API (Node.js + Express) ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "node dist/db/migrate.js && node dist/index.js"
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: postgres://orion:${POSTGRES_PASSWORD:-orion_dev_password}@postgres:5432/orion_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me_12345678901234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_123456789012345}
      OPERATOR_WEBHOOK_SECRET: ${OPERATOR_WEBHOOK_SECRET:-dev_operator_secret_change_me_123456789012}
      APP_URL: https://crm.orinjoias.com
      FRONTEND_URL: https://crm.orinjoias.com
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/orion-lead-captured}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network_v2
    volumes:
      - uploads_data:/app/uploads

  # ---- ORION Web (Next.js shell + CRM) ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      ORION_API_URL: http://api:4000/api/v1
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - app_network_v2

  # ---- NGINX (Internal Router) ----
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        echo  | base64 -d > /etc/nginx/nginx.conf && nginx -g 'daemon off;'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orion-crm.rule=Host(`crm.orinjoias.com`) || Host(`api.crm.orinjoias.com`) || Host(`local.orinjoias.com`)"
      - "traefik.http.routers.orion-crm.entrypoints=websecure"
      - "traefik.http.routers.orion-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.orion-crm.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-proxy"
    volumes:
      - uploads_data:/app/uploads:ro
    depends_on:
      - api
      - web
    networks:
      - app_network_v2
      - traefik-proxy

  # ---- Adminer (DB Admin UI) ----
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`db.crm.orinjoias.com`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-proxy"
    depends_on:
      - postgres
    networks:
      - app_network_v2
      - traefik-proxy

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  app_network_v2:
    external: true
  traefik-proxy:
    external: true
