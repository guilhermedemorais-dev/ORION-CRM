# Backend deployável. PostgreSQL externo (postgresql-sqyu) na porta 32768.
services:

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- ORION API (Node.js + Express) ----
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: orion-api:latest
    restart: unless-stopped
    command: sh -c "node dist/db/migrate.js && node dist/index.js"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me_12345678901234567890}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_123456789012345}
      OPERATOR_WEBHOOK_SECRET: ${OPERATOR_WEBHOOK_SECRET:-dev_operator_secret_change_me_123456789012}
      APP_URL: https://crm.orinjoias.com
      FRONTEND_URL: https://crm.orinjoias.com
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/orion-lead-captured}
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - uploads_data:/app/uploads

  # ---- ORION Web (Next.js shell + CRM) ----
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: orion-web:latest
    restart: unless-stopped
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      NODE_ENV: ${NODE_ENV:-production}
      ORION_API_URL: http://api:4000/api/v1
    depends_on:
      api:
        condition: service_started
    networks:
      - app_network


  # ---- NGINX (Internal Router) ----
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: orion-nginx:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orion-crm.rule=Host(`crm.orinjoias.com`) || Host(`api.crm.orinjoias.com`) || Host(`local.orinjoias.com`)"
      - "traefik.http.routers.orion-crm.entrypoints=websecure"
      - "traefik.http.routers.orion-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.orion-crm.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-proxy"
    volumes:
      - uploads_data:/app/uploads:ro
    depends_on:
      - api
      - web
    networks:
      - app_network
      - traefik-proxy

  # ---- Adminer (DB Admin UI — aponta para postgres externo) ----
  adminer:
    image: adminer:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
      ADMINER_DESIGN: dracula
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`db.crm.orinjoias.com`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-proxy"
    networks:
      - app_network
      - traefik-proxy

volumes:
  redis_data:
  uploads_data:


networks:
  app_network:
    driver: bridge
  traefik-proxy:
    external: true
